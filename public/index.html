<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f4f6f9;
      --bar-bg: #ffffff;
      --bar-border: #e2e8f0;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --btn-bg: #f1f5f9;
      --btn-border: #cbd5e1;
      --btn-hover: #e2e8f0;
      --status-ok: #22c55e;
      --status-err: #ef4444;
      --status-loading: #f59e0b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #tts-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 54px;
      flex-shrink: 0;
      background: var(--bar-bg);
      border-bottom: 1px solid var(--bar-border);
    }

    .bar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-muted);
      min-width: 130px;
    }

    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.loading { background: var(--status-loading); animation: pulse 1s infinite; }
    #status-dot.playing { background: var(--status-ok); }
    #status-dot.error   { background: var(--status-err); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    #waveform {
      display: flex; align-items: center; gap: 2px; height: 18px;
      opacity: 0; transition: opacity 0.3s;
    }
    #waveform.active { opacity: 1; }
    #waveform span {
      display: block; width: 3px; border-radius: 2px;
      background: var(--accent);
      animation: wave 0.8s ease-in-out infinite;
    }
    #waveform span:nth-child(1){height:6px;  animation-delay:0s}
    #waveform span:nth-child(2){height:14px; animation-delay:.1s}
    #waveform span:nth-child(3){height:10px; animation-delay:.2s}
    #waveform span:nth-child(4){height:16px; animation-delay:.15s}
    #waveform span:nth-child(5){height:8px;  animation-delay:.05s}
    @keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}

    .spacer { flex: 1; }

    #q-counter {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      background: var(--btn-bg); border: 1px solid var(--btn-border);
      border-radius: 8px; padding: 5px 12px;
    }

    .ctrl-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--btn-bg); border: 1px solid var(--btn-border);
      border-radius: 8px; padding: 6px 14px;
      font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      color: var(--text-primary); cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      user-select: none;
    }
    .ctrl-btn:hover { background: var(--btn-hover); border-color: #94a3b8; }
    .ctrl-btn:active { transform: scale(.97); }
    .ctrl-btn.muted { background:#fef2f2; border-color:#fca5a5; color:var(--status-err); }

    #btn-next {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    #btn-next:hover { background: #1d4ed8; border-color: #1d4ed8; }
    #btn-next:disabled {
      background: #94a3b8; border-color: #94a3b8;
      cursor: not-allowed; transform: none; opacity: 0.7;
    }

    #survey-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe { width: 100%; height: 100%; border: none; }

    #debug-panel {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0f172a;
      color: #94a3b8;
      font-family: 'Courier New', monospace;
      font-size: 11.5px;
      padding: 10px 16px;
      max-height: 160px;
      overflow-y: auto;
      z-index: 9999;
      border-top: 2px solid #ef4444;
    }
    #debug-panel.visible { display: block; }
    .log-line { margin: 2px 0; line-height: 1.5; }
    .log-line.err  { color: #f87171; }
    .log-line.ok   { color: #4ade80; }
    .log-line.info { color: #60a5fa; }

    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #fff;
      font-size: 13px; font-weight: 500;
      padding: 10px 20px; border-radius: 10px;
      z-index: 9998; pointer-events: none;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div id="tts-controls">
    <span class="bar-label">🔊 Audio</span>

    <div id="status-pill">
      <span id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>

    <div id="waveform">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="spacer"></div>

    <div id="q-counter">Q 1 / 6</div>
    <button class="ctrl-btn" id="btn-replay">↺ Replay</button>
    <button class="ctrl-btn" id="btn-mute">🔊 Mute</button>
    <button class="ctrl-btn" id="btn-debug">🐛 Debug</button>
    <button class="ctrl-btn" id="btn-next">Next →</button>
  </div>

  <div id="survey-wrapper">
    <iframe
      id="survey-frame"
      src="https://app.formbricks.com/s/cmmtnwmbjax13qn01tl8lpylv"
      allow="autoplay"
    ></iframe>
  </div>

  <div id="debug-panel"></div>
  <div id="toast"></div>

  <script>
    // ═══════════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════════
    var GOOGLE_API_KEY = "AQ.Ab8RN6KFN8sus5AF8wgO5atM1RA4f0iORm3QB3kMcbLoZc4vIA";

    var GOOGLE_VOICE = {
      languageCode: "en-US",
      name: "en-US-Neural2-F",   // Natural female Neural2 voice
      ssmlGender: "FEMALE"
    };

    var questions = [
      "Welcome to the survey. Please click Next to begin.",
      "Question 1: What is your full name?",
      "Question 2: What is your date of birth?",
      "Question 3: What is your address?",
      "Question 4: How would you rate your experience? Your options are: Excellent, Good, Fair, or Poor.",
      "Thank you for completing the survey. Your responses have been recorded."
    ];

    // ═══════════════════════════════════════════════
    //  State
    // ═══════════════════════════════════════════════
    var currentIndex = 0;
    var muted        = false;
    var currentAudio = null;
    var audioCache   = {};  // text -> base64 string

    // ═══════════════════════════════════════════════
    //  Debug logger
    // ═══════════════════════════════════════════════
    var debugPanel = document.getElementById("debug-panel");

    function log(msg, type) {
      var line = document.createElement("div");
      line.className = "log-line " + (type || "info");
      var ts = new Date().toLocaleTimeString("en-US", { hour12: false });
      line.textContent = "[" + ts + "] " + msg;
      debugPanel.appendChild(line);
      debugPanel.scrollTop = debugPanel.scrollHeight;
      if (type === "err") debugPanel.classList.add("visible");
    }

    document.getElementById("btn-debug").addEventListener("click", function() {
      debugPanel.classList.toggle("visible");
    });

    // ═══════════════════════════════════════════════
    //  UI helpers
    // ═══════════════════════════════════════════════
    var statusDot  = document.getElementById("status-dot");
    var statusText = document.getElementById("status-text");
    var waveform   = document.getElementById("waveform");
    var qCounter   = document.getElementById("q-counter");
    var toast      = document.getElementById("toast");
    var btnNext    = document.getElementById("btn-next");

    function setStatus(state, text) {
      statusDot.className = state || "";
      statusText.textContent = text || "Ready";
    }

    function setWave(on) { waveform.classList.toggle("active", on); }

    function updateCounter() {
      qCounter.textContent = "Q " + (currentIndex + 1) + " / " + questions.length;
      btnNext.disabled = (currentIndex >= questions.length - 1);
    }

    var toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toast.classList.remove("show"); }, 2800);
    }

    // ═══════════════════════════════════════════════
    //  Google Cloud TTS
    // ═══════════════════════════════════════════════
    function fetchAndPlay(text) {
      if (muted) return;
      stopAudio();

      // Instant replay from cache
      if (audioCache[text]) {
        log("Cache hit — playing instantly", "ok");
        playBase64(audioCache[text]);
        return;
      }

      setStatus("loading", "Generating…");
      log("POST → Google Cloud TTS, voice=" + GOOGLE_VOICE.name);
      log("Text: \"" + text.substring(0, 60) + (text.length > 60 ? "…" : "") + "\"");

      fetch("https://texttospeech.googleapis.com/v1/text:synthesize?key=" + GOOGLE_API_KEY, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          input: { text: text },
          voice: GOOGLE_VOICE,
          audioConfig: {
            audioEncoding: "MP3",
            speakingRate: 0.95,
            pitch: 0
          }
        })
      })
      .then(function(res) {
        log("HTTP " + res.status + " " + res.statusText, res.ok ? "ok" : "err");
        if (!res.ok) {
          return res.text().then(function(body) {
            throw new Error("HTTP " + res.status + ": " + body.substring(0, 300));
          });
        }
        return res.json();
      })
      .then(function(data) {
        if (!data.audioContent) {
          throw new Error("No audioContent in response — " + JSON.stringify(data).substring(0, 200));
        }
        log("Audio received (" + Math.round(data.audioContent.length * 0.75 / 1024) + " KB)", "ok");
        audioCache[text] = data.audioContent;
        playBase64(data.audioContent);
      })
      .catch(function(err) {
        log("FAILED: " + err.message, "err");
        setStatus("error", "Error — see Debug");
        setWave(false);
        showToast("⚠️ Audio error — click 🐛 Debug");
      });
    }

    function playBase64(b64) {
      var audio = new Audio("data:audio/mp3;base64," + b64);
      currentAudio = audio;

      audio.onplay = function() {
        setStatus("playing", "Playing…");
        setWave(true);
        log("▶ Playback started", "ok");
      };
      audio.onended = function() {
        setStatus("", "Ready");
        setWave(false);
        log("■ Playback ended");
      };
      audio.onerror = function() {
        log("Audio element playback error", "err");
        setStatus("error", "Playback error");
        setWave(false);
      };
      audio.play().catch(function(err) {
        log("Autoplay blocked: " + err.message, "err");
        setStatus("", "Tap to play");
        showToast("👆 Click anywhere on the page, then hit Replay");
        var retry = function() {
          document.removeEventListener("click", retry);
          if (currentAudio) currentAudio.play().catch(function(){});
        };
        document.addEventListener("click", retry);
      });
    }

    function stopAudio() {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio.onended = null;
        currentAudio = null;
      }
      setWave(false);
    }

    function speakCurrent() {
      updateCounter();
      log("→ Q" + (currentIndex + 1) + ": \"" + questions[currentIndex].substring(0, 50) + "\"");
      fetchAndPlay(questions[currentIndex]);
    }

    // ═══════════════════════════════════════════════
    //  Buttons
    // ═══════════════════════════════════════════════
    btnNext.addEventListener("click", function() {
      if (currentIndex >= questions.length - 1) return;
      currentIndex++;
      speakCurrent();
    });

    document.getElementById("btn-replay").addEventListener("click", function() {
      if (muted) { showToast("Unmute first"); return; }
      log("Replay Q" + (currentIndex + 1));
      fetchAndPlay(questions[currentIndex]);
      showToast("↺ Replaying…");
    });

    document.getElementById("btn-mute").addEventListener("click", function() {
      muted = !muted;
      if (muted) {
        stopAudio();
        this.textContent = "🔇 Unmute";
        this.classList.add("muted");
        setStatus("", "Muted");
        log("Muted");
        showToast("Audio muted");
      } else {
        this.textContent = "🔊 Mute";
        this.classList.remove("muted");
        setStatus("", "Ready");
        log("Unmuted");
        showToast("Audio on");
      }
    });

    // Formbricks completion event
    window.addEventListener("message", function(ev) {
      if (ev.origin !== "https://app.formbricks.com") return;
      log("postMessage: " + JSON.stringify(ev.data));
      if (
        ev.data === "formbricksSurveyCompleted" ||
        (ev.data && ev.data.type === "formbricksSurveyCompleted")
      ) {
        log("Survey completed!", "ok");
        currentIndex = questions.length - 1;
        speakCurrent();
      }
    });

    // ═══════════════════════════════════════════════
    //  Init
    // ═══════════════════════════════════════════════
    window.addEventListener("load", function() {
      updateCounter();
      log("Loaded. Voice: " + GOOGLE_VOICE.name + " | Questions: " + questions.length, "ok");
      setTimeout(speakCurrent, 1500);
    });
  </script>

</body>
</html>
