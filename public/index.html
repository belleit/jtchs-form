<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f8fafc; }

    #tts-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 8px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }

    #tts-controls button {
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #64748b;
    }

    #tts-controls button:hover { background: #f1f5f9; }

    iframe {
      width: 100%;
      height: calc(100vh - 41px);
      border: none;
    }
  </style>
</head>
<body>

  <div id="tts-controls">
    <span style="font-size:12px;color:#94a3b8;">🔊 Audio</span>
    <button id="btn-replay">↺ Replay</button>
    <button id="btn-mute">Mute</button>
  </div>

  <iframe
    id="survey-frame"
    src="https://app.formbricks.com/s/cmmtnwmbjax13qn01tl8lpylv"
    allow="autoplay"
  ></iframe>

  <script>
    var muted = false;
    var lastText = "";
    var synth = window.speechSynthesis;

    function speak(text) {
      if (muted || !text || text === lastText) return;
      lastText = text;
      synth.cancel();
      var utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.95;
      utt.lang = "en-US";
      synth.speak(utt);
    }

    function replay() {
      if (muted || !lastText) return;
      synth.cancel();
      var utt = new SpeechSynthesisUtterance(lastText);
      utt.rate = 0.95;
      utt.lang = "en-US";
      synth.speak(utt);
    }

    // Listen for messages from Formbricks iframe
    window.addEventListener("message", function(event) {
      if (event.origin !== "https://app.formbricks.com") return;
      console.log("formbricks message:", event.data);
      // Speak any question text that comes through
      if (event.data && event.data.questionText) {
        speak(event.data.questionText);
      }
    });

    document.getElementById("btn-mute").addEventListener("click", function() {
      muted = !muted;
      this.textContent = muted ? "Unmute" : "Mute";
      if (muted) synth.cancel();
    });

    document.getElementById("btn-replay").addEventListener("click", replay);
  </script>

</body>
</html>
