<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JTCHS Survey</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f4f6f9; --bar-bg: #ffffff; --bar-border: #e2e8f0;
      --text-primary: #1e293b; --text-muted: #64748b; --accent: #2563eb;
      --btn-bg: #f1f5f9; --btn-border: #cbd5e1; --btn-hover: #e2e8f0;
      --status-ok: #22c55e; --status-err: #ef4444; --status-loading: #f59e0b;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
    #tts-controls { display:flex; align-items:center; gap:10px; padding:0 16px; height:54px; flex-shrink:0; background:var(--bar-bg); border-bottom:1px solid var(--bar-border); }
    .bar-label { font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); }
    #status-pill { display:flex; align-items:center; gap:6px; background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--text-muted); min-width:130px; }
    #status-dot { width:7px; height:7px; border-radius:50%; background:#94a3b8; flex-shrink:0; transition:background .3s; }
    #status-dot.loading { background:var(--status-loading); animation:pulse 1s infinite; }
    #status-dot.playing { background:var(--status-ok); }
    #status-dot.error   { background:var(--status-err); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    #waveform { display:flex; align-items:center; gap:2px; height:18px; opacity:0; transition:opacity .3s; }
    #waveform.active { opacity:1; }
    #waveform span { display:block; width:3px; border-radius:2px; background:var(--accent); animation:wave .8s ease-in-out infinite; }
    #waveform span:nth-child(1){height:6px;animation-delay:0s}
    #waveform span:nth-child(2){height:14px;animation-delay:.1s}
    #waveform span:nth-child(3){height:10px;animation-delay:.2s}
    #waveform span:nth-child(4){height:16px;animation-delay:.15s}
    #waveform span:nth-child(5){height:8px;animation-delay:.05s}
    @keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
    .spacer { flex:1; }
    #voice-label { font-size:11px; color:var(--text-muted); background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:8px; padding:5px 10px; max-width:180px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    #q-counter { font-size:12px; font-weight:600; color:var(--text-muted); background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:8px; padding:5px 12px; }
    .ctrl-btn { display:flex; align-items:center; gap:6px; background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:8px; padding:6px 14px; font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif; color:var(--text-primary); cursor:pointer; transition:background .15s,border-color .15s,transform .1s; user-select:none; }
    .ctrl-btn:hover { background:var(--btn-hover); border-color:#94a3b8; }
    .ctrl-btn:active { transform:scale(.97); }
    .ctrl-btn.muted { background:#fef2f2; border-color:#fca5a5; color:var(--status-err); }
    .ctrl-btn.active-btn { background:#dbeafe; border-color:#93c5fd; color:#1d4ed8; }
    #survey-wrapper { flex:1; position:relative; overflow:hidden; }
    #tally-iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
    #debug-panel { display:none; position:fixed; bottom:0; left:0; right:0; background:#0f172a; color:#94a3b8; font-family:'Courier New',monospace; font-size:11.5px; padding:10px 16px; max-height:200px; overflow-y:auto; z-index:9999; border-top:2px solid #334155; }
    #debug-panel.visible { display:block; }
    .log-line { margin:2px 0; line-height:1.5; }
    .log-line.err  { color:#f87171; }
    .log-line.ok   { color:#4ade80; }
    .log-line.info { color:#60a5fa; }
    .log-line.warn { color:#fbbf24; }
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1e293b; color:#fff; font-size:13px; font-weight:500; padding:10px 20px; border-radius:10px; z-index:9998; pointer-events:none; transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s; opacity:0; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  </style>
</head>
<body>

  <div id="tts-controls">
    <span class="bar-label">🔊 Audio</span>
    <div id="status-pill"><span id="status-dot"></span><span id="status-text">Ready</span></div>
    <div id="waveform"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="spacer"></div>
    <div id="voice-label">Loading voices…</div>
    <div id="q-counter">Q 1 / 6</div>
    <button class="ctrl-btn" id="btn-replay">↺ Replay</button>
    <button class="ctrl-btn" id="btn-mute">🔊 Mute</button>
    <button class="ctrl-btn" id="btn-debug">🐛 Debug</button>
  </div>

  <div id="survey-wrapper">
    <!--
      Set src DIRECTLY — no embed.js dependency at all.
      /embed/ path is required for postMessage events.
      autoFocus=0 prevents scroll-jump on load.
    -->
    <iframe
      id="tally-iframe"
      src="https://tally.so/embed/WOPEQj?autoFocus=0&transparentBackground=1"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="JTCHS Survey"
      allow="camera; microphone; autoplay"
    ></iframe>
  </div>

  <div id="debug-panel"></div>
  <div id="toast"></div>

  <script>
    var questions = [
      "Welcome to the JTCHS survey. Please click Next to begin.",
      "Question 1: I feel that my values align with the company mission and culture. Select a number from 1 to 10.",
      "Question 2: I understand how my role contributes to the company's overall strategy. Select a number from 1 to 10.",
      "Question 3: I feel supported by my manager in my professional development. Select a number from 1 to 10.",
      "Question 4: I would recommend this organization as a great place to work. Select a number from 1 to 10.",
      "Thank you for completing the survey. Your responses have been recorded."
    ];

    var currentIndex  = 0;
    var muted         = false;
    var selectedVoice = null;
    var synth         = window.speechSynthesis;
    var formLoaded    = false;

    var debugPanel = document.getElementById("debug-panel");
    var statusDot  = document.getElementById("status-dot");
    var statusText = document.getElementById("status-text");
    var waveform   = document.getElementById("waveform");
    var qCounter   = document.getElementById("q-counter");
    var voiceLabel = document.getElementById("voice-label");
    var toast      = document.getElementById("toast");

    // ── Debug — auto-open on load so you can see everything ──────────────────
    debugPanel.classList.add("visible");
    document.getElementById("btn-debug").addEventListener("click", function() {
      debugPanel.classList.toggle("visible");
    });

    function log(msg, type) {
      var line = document.createElement("div");
      line.className = "log-line " + (type||"info");
      line.textContent = "["+new Date().toLocaleTimeString("en-US",{hour12:false})+"] "+msg;
      debugPanel.appendChild(line);
      debugPanel.scrollTop = debugPanel.scrollHeight;
    }

    function setStatus(s,t){ statusDot.className=s||""; statusText.textContent=t||"Ready"; }
    function setWave(on){ waveform.classList.toggle("active",on); }
    function updateCounter(){ qCounter.textContent="Q "+(currentIndex+1)+" / "+questions.length; }
    var toastTimer;
    function showToast(msg){ toast.textContent=msg; toast.classList.add("show"); clearTimeout(toastTimer); toastTimer=setTimeout(function(){ toast.classList.remove("show"); },2800); }

    // ── Voices ────────────────────────────────────────────────────────────────
    var PREF = ["Samantha","Karen","Moira","Tessa","Victoria","Zira","Microsoft Zira","Google US English"];
    function pickBestVoice(voices) {
      var en = voices.filter(function(v){ return v.lang&&v.lang.startsWith("en"); });
      for (var i=0;i<PREF.length;i++) {
        var m = en.find(function(v){ return v.name.indexOf(PREF[i])!==-1; });
        if (m) return m;
      }
      return en.find(function(v){ return v.lang==="en-US"; })||en[0]||voices[0]||null;
    }
    function loadVoices(){
      var v=synth.getVoices(); if(!v.length)return;
      selectedVoice=pickBestVoice(v);
      voiceLabel.textContent=selectedVoice?"🎙 "+selectedVoice.name:"Default voice";
      log("Voice ready: "+(selectedVoice?selectedVoice.name:"default"), "ok");
    }
    if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoices;
    loadVoices();

    // ── TTS ───────────────────────────────────────────────────────────────────
    function speak(text){
      if(muted||!text)return; synth.cancel();
      var utt=new SpeechSynthesisUtterance(text);
      if(selectedVoice)utt.voice=selectedVoice;
      utt.lang="en-US"; utt.rate=0.92; utt.pitch=1.0; utt.volume=1.0;
      utt.onstart=function(){ setStatus("playing","Playing…"); setWave(true); };
      utt.onend=function(){ setStatus("","Ready"); setWave(false); };
      utt.onerror=function(e){ if(e.error==="interrupted"||e.error==="canceled")return; setStatus("error","TTS Error"); setWave(false); log("TTS error: "+e.error,"err"); };
      setStatus("loading","Speaking…"); synth.speak(utt);
    }
    function speakCurrent(){ updateCounter(); speak(questions[currentIndex]); }

    // ── ALL postMessage events — log everything, not just tally- ─────────────
    window.addEventListener("message", function(ev) {
      // Log every single message so we can see what Tally actually sends
      var origin = ev.origin || "unknown";
      var data   = ev.data;
      var type   = (data && typeof data === "object") ? (data.type || data.event || "no-type") : typeof data;

      log("MSG from "+origin+" | type="+type+" | "+JSON.stringify(data).substring(0,120), "warn");

      if (!data || typeof data !== "object") return;
      var t = data.type || data.event;
      if (!t || typeof t !== "string") return;

      switch(t) {
        case "tally-form-loaded":
          formLoaded = true;
          log("✓ tally-form-loaded fired!", "ok");
          currentIndex = 0;
          speakCurrent();
          break;
        case "tally-form-page-view":
          if (typeof data.pageIndex === "number") {
            currentIndex = data.pageIndex;
          } else {
            currentIndex = Math.min(currentIndex + 1, questions.length - 1);
          }
          log("✓ tally-form-page-view → Q"+(currentIndex+1), "ok");
          speakCurrent();
          break;
        case "tally-form-submit":
          log("✓ tally-form-submit fired!", "ok");
          currentIndex = questions.length - 1;
          speakCurrent();
          showToast("✓ Survey submitted");
          break;
        default:
          // Already logged above
          break;
      }
    });

    // ── iframe load event ─────────────────────────────────────────────────────
    var iframe = document.getElementById("tally-iframe");
    iframe.addEventListener("load", function() {
      log("iframe onload fired (src="+iframe.src+")", "ok");
      // Speak welcome on iframe load as a reliable fallback
      if (!formLoaded) {
        log("No tally-form-loaded yet — speaking welcome via iframe.onload fallback", "warn");
        speakCurrent();
      }
    });

    // ── Controls ──────────────────────────────────────────────────────────────
    document.getElementById("btn-replay").addEventListener("click", function(){
      if(muted){showToast("Unmute first");return;}
      speak(questions[currentIndex]); showToast("↺ Replaying…");
    });
    document.getElementById("btn-mute").addEventListener("click", function(){
      muted=!muted;
      if(muted){ synth.cancel(); this.textContent="🔇 Unmute"; this.classList.add("muted"); setStatus("","Muted"); setWave(false); showToast("Audio muted"); }
      else { this.textContent="🔊 Mute"; this.classList.remove("muted"); setStatus("","Ready"); showToast("Audio on"); }
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    window.addEventListener("load", function(){
      updateCounter();
      log("Page loaded. iframe src: "+iframe.src, "ok");
      log("Listening for ALL postMessage events…", "info");
      setTimeout(loadVoices, 500);
    });
  </script>
</body>
</html>
