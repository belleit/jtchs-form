<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey</title>
</head>
<body>
  <div id="formbricks-survey" style="width:100%;height:100vh;"></div>

  <script src="./formbricks.js"></script>
  <script>
    fetch("https://app.formbricks.com/api/v1/client/cmms3molo09piu701aeg36oqf/surveys/cmmtl178i8ivupr018cvotbyr")
      .then(function(res) { return res.json(); })
      .then(function(data) {
        console.log("survey data:", data);
        window.formbricksSurveys.renderSurveyInline({
          containerId: "formbricks-survey",
          survey: data.data,
          styling: {
            roundness: 8,
            cardArrangement: {
              linkSurveys: "straight",
              appSurveys: "straight"
            }
          },
        });
      })
      .catch(function(err) {
        console.error("failed to fetch survey:", err);
      });
  </script>
</body>
</html>
