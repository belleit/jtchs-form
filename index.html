<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JTCHS Survey</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #f4f6f9; --bar-bg: #ffffff; --bar-border: #e2e8f0;
      --text-primary: #1e293b; --text-muted: #64748b; --accent: #2563eb;
      --btn-bg: #f1f5f9; --btn-border: #cbd5e1; --btn-hover: #e2e8f0;
      --status-ok: #22c55e; --status-err: #ef4444; --status-loading: #f59e0b;
    }
    body { font-family:'DM Sans',sans-serif; background:var(--bg); height:100vh; overflow:hidden; display:flex; flex-direction:column; }
    #tts-controls { display:flex; align-items:center; gap:10px; padding:0 16px; height:54px; flex-shrink:0; background:var(--bar-bg); border-bottom:1px solid var(--bar-border); }
    .bar-label { font-size:11px; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:var(--text-muted); }
    #status-pill { display:flex; align-items:center; gap:6px; background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:20px; padding:4px 12px; font-size:12px; color:var(--text-muted); min-width:130px; }
    #status-dot { width:7px; height:7px; border-radius:50%; background:#94a3b8; flex-shrink:0; transition:background .3s; }
    #status-dot.loading { background:var(--status-loading); animation:pulse 1s infinite; }
    #status-dot.playing { background:var(--status-ok); }
    #status-dot.error   { background:var(--status-err); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
    #waveform { display:flex; align-items:center; gap:2px; height:18px; opacity:0; transition:opacity .3s; }
    #waveform.active { opacity:1; }
    #waveform span { display:block; width:3px; border-radius:2px; background:var(--accent); animation:wave .8s ease-in-out infinite; }
    #waveform span:nth-child(1){height:6px;animation-delay:0s}
    #waveform span:nth-child(2){height:14px;animation-delay:.1s}
    #waveform span:nth-child(3){height:10px;animation-delay:.2s}
    #waveform span:nth-child(4){height:16px;animation-delay:.15s}
    #waveform span:nth-child(5){height:8px;animation-delay:.05s}
    @keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
    .spacer { flex:1; }
    #voice-label { font-size:11px; color:var(--text-muted); background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:8px; padding:5px 10px; }
    #q-counter { font-size:12px; font-weight:600; color:var(--text-muted); background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:8px; padding:5px 12px; }
    .ctrl-btn { display:flex; align-items:center; gap:6px; background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:8px; padding:6px 14px; font-size:13px; font-weight:500; font-family:'DM Sans',sans-serif; color:var(--text-primary); cursor:pointer; transition:background .15s,border-color .15s,transform .1s; user-select:none; }
    .ctrl-btn:hover { background:var(--btn-hover); border-color:#94a3b8; }
    .ctrl-btn:active { transform:scale(.97); }
    .ctrl-btn.muted { background:#fef2f2; border-color:#fca5a5; color:var(--status-err); }
    #survey-wrapper { flex:1; position:relative; overflow:hidden; }
    #tally-iframe { position:absolute; top:0; left:0; width:100%; height:100%; border:none; }
    #debug-panel { display:none; position:fixed; bottom:0; left:0; right:0; background:#0f172a; color:#94a3b8; font-family:'Courier New',monospace; font-size:11.5px; padding:10px 16px; max-height:160px; overflow-y:auto; z-index:9999; border-top:2px solid #334155; }
    #debug-panel.visible { display:block; }
    .log-line { margin:2px 0; line-height:1.5; }
    .log-line.err  { color:#f87171; }
    .log-line.ok   { color:#4ade80; }
    .log-line.info { color:#60a5fa; }
    #toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:#1e293b; color:#fff; font-size:13px; font-weight:500; padding:10px 20px; border-radius:10px; z-index:9998; pointer-events:none; transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s; opacity:0; white-space:nowrap; }
    #toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  </style>
</head>
<body>

  <div id="tts-controls">
    <span class="bar-label">🔊 Audio</span>
    <div id="status-pill"><span id="status-dot"></span><span id="status-text">Ready</span></div>
    <div id="waveform"><span></span><span></span><span></span><span></span><span></span></div>
    <div class="spacer"></div>
    <div id="voice-label">🎙 nova</div>
    <div id="q-counter">Page 1 / 4</div>
    <button class="ctrl-btn" id="btn-replay">↺ Replay</button>
    <button class="ctrl-btn" id="btn-mute">🔊 Mute</button>
    <button class="ctrl-btn" id="btn-debug">🐛 Debug</button>
  </div>

  <div id="survey-wrapper">
    <iframe
      id="tally-iframe"
      src="https://tally.so/embed/WOPEQj?autoFocus=0&transparentBackground=1"
      frameborder="0"
      marginheight="0"
      marginwidth="0"
      title="JTCHS Survey"
    ></iframe>
  </div>

  <div id="debug-panel"></div>
  <div id="toast"></div>

  <script>
    // ═══════════════════════════════════════════════
    //  CONFIG — key is injected by GitHub Actions
    //  DO NOT hardcode the real key here
    // ═══════════════════════════════════════════════
    var OPENAI_API_KEY = "%%OPENAI_API_KEY%%";  // replaced at build time
    var OPENAI_VOICE   = "nova";
    var OPENAI_MODEL   = "tts-1";

    var pageMap = {
      1: "Welcome to the JTCHS survey. Please click Next to begin.",
      2: "Question 1: I feel that my values align with the company mission and culture. Select a number from 1 to 10.",
      3: "Question 2: I understand how my role contributes to the company's overall strategy. Select a number from 1 to 10.",
      4: "Question 3: I feel supported by my manager in my professional development. Select a number from 1 to 10."
    };
    var submitText = "Thank you for completing the survey. Your responses have been recorded.";
    var totalPages = Object.keys(pageMap).length;

    var currentPage  = 1;
    var muted        = false;
    var currentAudio = null;
    var audioCache   = {};

    var debugPanel = document.getElementById("debug-panel");
    var statusDot  = document.getElementById("status-dot");
    var statusText = document.getElementById("status-text");
    var waveform   = document.getElementById("waveform");
    var qCounter   = document.getElementById("q-counter");
    var toast      = document.getElementById("toast");

    function log(msg, type) {
      var line = document.createElement("div");
      line.className = "log-line " + (type || "info");
      line.textContent = "[" + new Date().toLocaleTimeString("en-US", {hour12:false}) + "] " + msg;
      debugPanel.appendChild(line);
      debugPanel.scrollTop = debugPanel.scrollHeight;
      if (type === "err") debugPanel.classList.add("visible");
    }
    document.getElementById("btn-debug").addEventListener("click", function() {
      debugPanel.classList.toggle("visible");
    });

    function setStatus(s, t) { statusDot.className = s || ""; statusText.textContent = t || "Ready"; }
    function setWave(on) { waveform.classList.toggle("active", on); }
    function updateCounter(p) { qCounter.textContent = "Page " + p + " / " + totalPages; }
    var toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toast.classList.remove("show"); }, 2800);
    }

    function fetchAndPlay(text) {
      if (muted || !text) return;
      stopAudio();

      if (audioCache[text]) {
        log("Cache hit — playing instantly", "ok");
        playBlob(audioCache[text]);
        return;
      }

      // Guard: catch un-replaced placeholder
      if (OPENAI_API_KEY === "%%OPENAI_API_KEY%%") {
        log("ERROR: API key placeholder was not replaced — check GitHub Actions workflow", "err");
        setStatus("error", "Key not injected");
        showToast("⚠️ API key missing — see 🐛 Debug");
        return;
      }

      setStatus("loading", "Generating…");
      log("POST → OpenAI TTS | voice=" + OPENAI_VOICE);

      fetch("https://api.openai.com/v1/audio/speech", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + OPENAI_API_KEY,
          "Content-Type":  "application/json"
        },
        body: JSON.stringify({
          model: OPENAI_MODEL,
          voice: OPENAI_VOICE,
          input: text,
          speed: 0.95
        })
      })
      .then(function(res) {
        log("HTTP " + res.status, res.ok ? "ok" : "err");
        if (!res.ok) {
          return res.text().then(function(body) {
            throw new Error("HTTP " + res.status + ": " + body.substring(0, 200));
          });
        }
        return res.blob();
      })
      .then(function(blob) {
        log("Audio: " + (blob.size / 1024).toFixed(1) + " KB", "ok");
        audioCache[text] = blob;
        playBlob(blob);
      })
      .catch(function(err) {
        log("FAILED: " + err.message, "err");
        setStatus("error", "Error — see Debug");
        setWave(false);
        showToast("⚠️ Audio error — click 🐛 Debug");
      });
    }

    function playBlob(blob) {
      var url = URL.createObjectURL(blob);
      var audio = new Audio(url);
      currentAudio = audio;
      audio.onplay  = function() { setStatus("playing", "Playing…"); setWave(true); log("▶ Playing", "ok"); };
      audio.onended = function() { setStatus("", "Ready"); setWave(false); URL.revokeObjectURL(url); };
      audio.onerror = function() { log("Playback error", "err"); setStatus("error", "Playback error"); setWave(false); };
      audio.play().catch(function(err) {
        log("Autoplay blocked: " + err.message, "err");
        setStatus("", "Tap to play");
        showToast("👆 Click anywhere, then hit Replay");
        var retry = function() {
          document.removeEventListener("click", retry);
          if (currentAudio) currentAudio.play().catch(function(){});
        };
        document.addEventListener("click", retry);
      });
    }

    function stopAudio() {
      if (currentAudio) { currentAudio.pause(); currentAudio.onended = null; currentAudio = null; }
      setWave(false);
    }

    window.addEventListener("message", function(ev) {
      if (!ev.data || typeof ev.data !== "string") return;
      var msg; try { msg = JSON.parse(ev.data); } catch(e) { return; }
      var event = msg.event; var payload = msg.payload || {};
      if (!event || !event.startsWith("Tally.")) return;
      log(event + " | page=" + (payload.page || "-"), "ok");
      if (event === "Tally.FormPageView") {
        currentPage = payload.page || 1;
        updateCounter(currentPage);
        var text = pageMap[currentPage];
        if (text) fetchAndPlay(text);
      }
      if (event === "Tally.FormSubmitted") {
        updateCounter(totalPages);
        fetchAndPlay(submitText);
        showToast("✓ Survey submitted");
      }
    });

    document.getElementById("btn-replay").addEventListener("click", function() {
      if (muted) { showToast("Unmute first"); return; }
      fetchAndPlay(pageMap[currentPage] || submitText);
      showToast("↺ Replaying…");
    });

    document.getElementById("btn-mute").addEventListener("click", function() {
      muted = !muted;
      if (muted) {
        stopAudio();
        this.textContent = "🔇 Unmute"; this.classList.add("muted");
        setStatus("", "Muted"); setWave(false); showToast("Audio muted");
      } else {
        this.textContent = "🔊 Mute"; this.classList.remove("muted");
        setStatus("", "Ready"); showToast("Audio on");
      }
    });

    window.addEventListener("load", function() {
      updateCounter(1);
      log("JTCHS Survey loaded | voice=" + OPENAI_VOICE + " | model=" + OPENAI_MODEL, "ok");
    });
  </script>
</body>
</html>
