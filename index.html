<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f4f6f9;
      --bar-bg: #ffffff;
      --bar-border: #e2e8f0;
      --text-primary: #1e293b;
      --text-muted: #64748b;
      --accent: #2563eb;
      --btn-bg: #f1f5f9;
      --btn-border: #cbd5e1;
      --btn-hover: #e2e8f0;
      --status-ok: #22c55e;
      --status-err: #ef4444;
      --status-loading: #f59e0b;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    #tts-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 54px;
      flex-shrink: 0;
      background: var(--bar-bg);
      border-bottom: 1px solid var(--bar-border);
    }

    .bar-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    #status-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-muted);
      min-width: 130px;
    }

    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #94a3b8;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    #status-dot.loading { background: var(--status-loading); animation: pulse 1s infinite; }
    #status-dot.playing { background: var(--status-ok); }
    #status-dot.error   { background: var(--status-err); }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    #waveform {
      display: flex; align-items: center; gap: 2px; height: 18px;
      opacity: 0; transition: opacity 0.3s;
    }
    #waveform.active { opacity: 1; }
    #waveform span {
      display: block; width: 3px; border-radius: 2px;
      background: var(--accent);
      animation: wave 0.8s ease-in-out infinite;
    }
    #waveform span:nth-child(1){height:6px;  animation-delay:0s}
    #waveform span:nth-child(2){height:14px; animation-delay:.1s}
    #waveform span:nth-child(3){height:10px; animation-delay:.2s}
    #waveform span:nth-child(4){height:16px; animation-delay:.15s}
    #waveform span:nth-child(5){height:8px;  animation-delay:.05s}
    @keyframes wave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}

    .spacer { flex: 1; }

    #voice-label {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--btn-bg);
      border: 1px solid var(--btn-border);
      border-radius: 8px;
      padding: 5px 10px;
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #q-counter {
      font-size: 12px; font-weight: 600; color: var(--text-muted);
      background: var(--btn-bg); border: 1px solid var(--btn-border);
      border-radius: 8px; padding: 5px 12px;
    }

    .ctrl-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--btn-bg); border: 1px solid var(--btn-border);
      border-radius: 8px; padding: 6px 14px;
      font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif;
      color: var(--text-primary); cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      user-select: none;
    }
    .ctrl-btn:hover { background: var(--btn-hover); border-color: #94a3b8; }
    .ctrl-btn:active { transform: scale(.97); }
    .ctrl-btn.muted { background:#fef2f2; border-color:#fca5a5; color:var(--status-err); }

    #btn-next {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    #btn-next:hover { background: #1d4ed8; border-color: #1d4ed8; }
    #btn-next:disabled {
      background: #94a3b8; border-color: #94a3b8;
      cursor: not-allowed; transform: none; opacity: 0.7;
    }

    #survey-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe { width: 100%; height: 100%; border: none; }

    #debug-panel {
      display: none;
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #0f172a;
      color: #94a3b8;
      font-family: 'Courier New', monospace;
      font-size: 11.5px;
      padding: 10px 16px;
      max-height: 160px;
      overflow-y: auto;
      z-index: 9999;
      border-top: 2px solid #334155;
    }
    #debug-panel.visible { display: block; }
    .log-line { margin: 2px 0; line-height: 1.5; }
    .log-line.err  { color: #f87171; }
    .log-line.ok   { color: #4ade80; }
    .log-line.info { color: #60a5fa; }

    #toast {
      position: fixed;
      bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #fff;
      font-size: 13px; font-weight: 500;
      padding: 10px 20px; border-radius: 10px;
      z-index: 9998; pointer-events: none;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div id="tts-controls">
    <span class="bar-label">🔊 Audio</span>

    <div id="status-pill">
      <span id="status-dot"></span>
      <span id="status-text">Ready</span>
    </div>

    <div id="waveform">
      <span></span><span></span><span></span><span></span><span></span>
    </div>

    <div class="spacer"></div>

    <div id="voice-label">Loading voices…</div>
    <div id="q-counter">Q 1 / 6</div>
    <button class="ctrl-btn" id="btn-replay">↺ Replay</button>
    <button class="ctrl-btn" id="btn-mute">🔊 Mute</button>
    <button class="ctrl-btn" id="btn-debug">🐛 Debug</button>
    <button class="ctrl-btn" id="btn-next">Next →</button>
  </div>

  <div id="survey-wrapper">
    <iframe
      id="survey-frame"
      src="https://app.formbricks.com/s/cmmtnwmbjax13qn01tl8lpylv"
      allow="autoplay"
    ></iframe>
  </div>

  <div id="debug-panel"></div>
  <div id="toast"></div>

  <script>
    // ═══════════════════════════════════════════════
    //  Questions — edit to match your Formbricks form
    // ═══════════════════════════════════════════════
    var questions = [
      "Welcome to the survey. Please click Next to begin.",
      "Question 1: What is your full name?",
      "Question 2: What is your date of birth?",
      "Question 3: What is your address?",
      "Question 4: How would you rate your experience? Your options are: Excellent, Good, Fair, or Poor.",
      "Thank you for completing the survey. Your responses have been recorded."
    ];

    // ═══════════════════════════════════════════════
    //  State
    // ═══════════════════════════════════════════════
    var currentIndex = 0;
    var muted        = false;
    var selectedVoice = null;
    var synth        = window.speechSynthesis;

    // ═══════════════════════════════════════════════
    //  Debug logger
    // ═══════════════════════════════════════════════
    var debugPanel = document.getElementById("debug-panel");

    function log(msg, type) {
      var line = document.createElement("div");
      line.className = "log-line " + (type || "info");
      var ts = new Date().toLocaleTimeString("en-US", { hour12: false });
      line.textContent = "[" + ts + "] " + msg;
      debugPanel.appendChild(line);
      debugPanel.scrollTop = debugPanel.scrollHeight;
      if (type === "err") debugPanel.classList.add("visible");
    }

    document.getElementById("btn-debug").addEventListener("click", function() {
      debugPanel.classList.toggle("visible");
    });

    // ═══════════════════════════════════════════════
    //  UI helpers
    // ═══════════════════════════════════════════════
    var statusDot  = document.getElementById("status-dot");
    var statusText = document.getElementById("status-text");
    var waveform   = document.getElementById("waveform");
    var qCounter   = document.getElementById("q-counter");
    var voiceLabel = document.getElementById("voice-label");
    var toast      = document.getElementById("toast");
    var btnNext    = document.getElementById("btn-next");

    function setStatus(state, text) {
      statusDot.className = state || "";
      statusText.textContent = text || "Ready";
    }
    function setWave(on) { waveform.classList.toggle("active", on); }
    function updateCounter() {
      qCounter.textContent = "Q " + (currentIndex + 1) + " / " + questions.length;
      btnNext.disabled = (currentIndex >= questions.length - 1);
    }

    var toastTimer;
    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toast.classList.remove("show"); }, 2800);
    }

    // ═══════════════════════════════════════════════
    //  Voice selection — pick best available female
    //  en-US voice, preferring enhanced/natural ones
    // ═══════════════════════════════════════════════

    // Preferred voice names in priority order
    var PREFERRED_VOICES = [
      "Samantha",           // macOS/iOS — very natural
      "Karen",              // macOS Australian
      "Moira",              // macOS Irish
      "Tessa",              // macOS South African
      "Victoria",           // macOS
      "Zira",               // Windows — decent
      "Microsoft Zira",
      "Google US English",  // Chrome on Android/desktop
      "en-US"               // fallback: any en-US
    ];

    function pickBestVoice(voices) {
      var enUS = voices.filter(function(v) {
        return v.lang && v.lang.startsWith("en");
      });

      log("Available en voices: " + enUS.map(function(v){ return v.name; }).join(", "));

      // Try preferred list first
      for (var i = 0; i < PREFERRED_VOICES.length; i++) {
        var pref = PREFERRED_VOICES[i];
        var match = enUS.find(function(v) {
          return v.name.indexOf(pref) !== -1;
        });
        if (match) {
          log("Selected voice: " + match.name + " (" + match.lang + ")", "ok");
          return match;
        }
      }

      // Fallback: first en-US, then first en, then first available
      var fallback = enUS.find(function(v){ return v.lang === "en-US"; })
                  || enUS[0]
                  || voices[0];

      if (fallback) log("Fallback voice: " + fallback.name, "ok");
      return fallback || null;
    }

    function loadVoices() {
      var voices = synth.getVoices();
      if (voices.length === 0) return; // not ready yet
      selectedVoice = pickBestVoice(voices);
      voiceLabel.textContent = selectedVoice ? "🎙 " + selectedVoice.name : "Default voice";
    }

    // Chrome loads voices async
    if (synth.onvoiceschanged !== undefined) {
      synth.onvoiceschanged = loadVoices;
    }
    loadVoices(); // also try immediately (Firefox/Safari)

    // ═══════════════════════════════════════════════
    //  Web Speech TTS
    // ═══════════════════════════════════════════════
    function speak(text) {
      if (muted || !text) return;

      synth.cancel(); // stop anything currently speaking

      var utt = new SpeechSynthesisUtterance(text);

      if (selectedVoice) utt.voice = selectedVoice;
      utt.lang  = "en-US";
      utt.rate  = 0.92;   // slightly slower = clearer
      utt.pitch = 1.0;
      utt.volume = 1.0;

      utt.onstart = function() {
        setStatus("playing", "Playing…");
        setWave(true);
        log("▶ Speaking: \"" + text.substring(0, 40) + "…\"", "ok");
      };

      utt.onend = function() {
        setStatus("", "Ready");
        setWave(false);
        log("■ Done");
      };

      utt.onerror = function(e) {
        // "interrupted" fires on synth.cancel() — not a real error
        if (e.error === "interrupted" || e.error === "canceled") return;
        log("Speech error: " + e.error, "err");
        setStatus("error", "Speech error");
        setWave(false);
      };

      setStatus("loading", "Speaking…");
      synth.speak(utt);
    }

    function speakCurrent() {
      updateCounter();
      log("→ Q" + (currentIndex + 1));
      speak(questions[currentIndex]);
    }

    // ═══════════════════════════════════════════════
    //  Buttons
    // ═══════════════════════════════════════════════
    btnNext.addEventListener("click", function() {
      if (currentIndex >= questions.length - 1) return;
      currentIndex++;
      speakCurrent();
    });

    document.getElementById("btn-replay").addEventListener("click", function() {
      if (muted) { showToast("Unmute first"); return; }
      log("Replay Q" + (currentIndex + 1));
      speak(questions[currentIndex]);
      showToast("↺ Replaying…");
    });

    document.getElementById("btn-mute").addEventListener("click", function() {
      muted = !muted;
      if (muted) {
        synth.cancel();
        this.textContent = "🔇 Unmute";
        this.classList.add("muted");
        setStatus("", "Muted");
        setWave(false);
        log("Muted");
        showToast("Audio muted");
      } else {
        this.textContent = "🔊 Mute";
        this.classList.remove("muted");
        setStatus("", "Ready");
        log("Unmuted");
        showToast("Audio on");
      }
    });

    // Formbricks completion event
    window.addEventListener("message", function(ev) {
      if (ev.origin !== "https://app.formbricks.com") return;
      log("postMessage: " + JSON.stringify(ev.data));
      if (
        ev.data === "formbricksSurveyCompleted" ||
        (ev.data && ev.data.type === "formbricksSurveyCompleted")
      ) {
        log("Survey completed!", "ok");
        currentIndex = questions.length - 1;
        speakCurrent();
      }
    });

    // ═══════════════════════════════════════════════
    //  Init
    // ═══════════════════════════════════════════════
    window.addEventListener("load", function() {
      updateCounter();
      log("Web Speech API ready | Questions: " + questions.length, "ok");

      // Give voices a moment to load, then speak
      setTimeout(function() {
        loadVoices(); // final attempt to grab voices
        speakCurrent();
      }, 1000);
    });
  </script>

</body>
</html>
