<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f8fafc; height: 100vh; overflow: hidden; }

    #tts-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 8px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }

    #tts-controls button {
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #64748b;
    }

    #tts-controls button:hover { background: #f1f5f9; }

    #survey-wrapper {
      position: relative;
      width: 100%;
      height: calc(100vh - 41px);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Overlay Next button at bottom right to match Formbricks position */
    #overlay-next {
      position: absolute;
      bottom: 48px;
      right: 48px;
      background: #000000;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      z-index: 999;
      opacity: 0;  /* invisible — sits on top of Formbricks button */
      width: 120px;
      height: 48px;
    }
  </style>
</head>
<body>

  <div id="tts-controls">
    <span style="font-size:12px;color:#94a3b8;">🔊 Audio</span>
    <button id="btn-replay">↺ Replay</button>
    <button id="btn-mute">Mute</button>
  </div>

  <div id="survey-wrapper">
    <iframe
      id="survey-frame"
      src="https://app.formbricks.com/s/cmmtnwmbjax13qn01tl8lpylv"
      allow="autoplay"
    ></iframe>
    <!-- Invisible overlay button sits on top of Formbricks Next button -->
    <button id="overlay-next" aria-label="Next question"></button>
  </div>

  <script>
    // --- Your questions in order ---
    var questions = [
      "Welcome to the survey. Please click Next to begin.",
      "Question 1: What is your full name?",
      "Question 2: What is your date of birth?",
      "Question 3: What is your address?",
      "Question 4: How would you rate your experience? Your options are: Excellent, Good, Fair, Poor.",
      "Thank you for completing the survey."
    ];

    var muted = false;
    var currentIndex = 0;
    var lastText = "";
    var synth = window.speechSynthesis;

    // --- ElevenLabs pre-generated MP3s (add filenames once generated) ---
    // var audioFiles = ["q0.mp3","q1.mp3","q2.mp3","q3.mp3","q4.mp3","q5.mp3"];
    // For now using browser TTS as placeholder

    function speak(text) {
      if (muted || !text) return;
      lastText = text;
      synth.cancel();
      var utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.95;
      utt.lang = "en-US";
      synth.speak(utt);
    }

    function replay() {
      if (muted || !lastText) return;
      synth.cancel();
      var utt = new SpeechSynthesisUtterance(lastText);
      utt.rate = 0.95;
      utt.lang = "en-US";
      synth.speak(utt);
    }

    // Speak first question on load
    window.addEventListener("load", function() {
      setTimeout(function() {
        speak(questions[0]);
      }, 1500);
    });

    // Overlay Next button click — advances audio AND clicks through to iframe
    document.getElementById("overlay-next").addEventListener("click", function(e) {
      // Advance to next question audio
      currentIndex = Math.min(currentIndex + 1, questions.length - 1);
      speak(questions[currentIndex]);
      // The click passes through to the iframe's Next button underneath
      // because the overlay button is transparent (opacity:0)
    });

    // Detect survey completion
    window.addEventListener("message", function(event) {
      if (event.origin !== "https://app.formbricks.com") return;
      if (event.data === "formbricksSurveyCompleted") {
        currentIndex = questions.length - 1;
        speak(questions[currentIndex]);
      }
    });

    document.getElementById("btn-mute").addEventListener("click", function() {
      muted = !muted;
      this.textContent = muted ? "Unmute" : "Mute";
      if (muted) synth.cancel();
    });

    document.getElementById("btn-replay").addEventListener("click", replay);
  </script>

</body>
</html>
