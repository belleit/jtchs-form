<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Survey</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #f8fafc; }

    #tts-controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 8px 16px;
      background: #ffffff;
      border-bottom: 1px solid #e2e8f0;
    }

    #tts-controls button {
      background: none;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 13px;
      color: #64748b;
    }

    #tts-controls button:hover { background: #f1f5f9; }

    iframe {
      width: 100%;
      height: calc(100vh - 41px);
      border: none;
    }
  </style>
</head>
<body>

  <div id="tts-controls">
    <span style="font-size:12px;color:#94a3b8;">🔊 Audio</span>
    <button id="btn-replay">↺ Replay</button>
    <button id="btn-mute">Mute</button>
  </div>

  <iframe
    id="survey-frame"
    src="https://app.formbricks.com/s/cmmtnwmbjax13qn01tl8lpylv"
    allow="autoplay"
  ></iframe>

  <script>
    // --- Test questions mapped by position ---
    var questions = [
      "Welcome to the survey. Please click Next to begin.",
      "Question 1: What is your full name?",
      "Question 2: What is your date of birth?",
      "Question 3: What is your address?",
      "Question 4: How would you rate your experience? Your options are: Excellent, Good, Fair, Poor.",
      "Thank you for completing the survey."
    ];

    var muted = false;
    var currentIndex = 0;
    var lastText = "";
    var synth = window.speechSynthesis;

    function speak(text) {
      if (muted || !text) return;
      lastText = text;
      synth.cancel();
      var utt = new SpeechSynthesisUtterance(text);
      utt.rate = 0.95;
      utt.lang = "en-US";
      synth.speak(utt);
    }

    function replay() {
      if (muted || !lastText) return;
      synth.cancel();
      var utt = new SpeechSynthesisUtterance(lastText);
      utt.rate = 0.95;
      utt.lang = "en-US";
      synth.speak(utt);
    }

    // Speak first question on load
    window.addEventListener("load", function() {
      setTimeout(function() {
        speak(questions[0]);
      }, 1500);
    });

    // Watch iframe URL changes via polling — fires when user advances questions
    var iframe = document.getElementById("survey-frame");
    var lastSrc = iframe.src;

    setInterval(function() {
      try {
        var currentSrc = iframe.contentWindow.location.href;
        if (currentSrc !== lastSrc) {
          lastSrc = currentSrc;
          currentIndex++;
          if (questions[currentIndex]) {
            speak(questions[currentIndex]);
          }
        }
      } catch(e) {
        // cross-origin block — fall through
      }
    }, 300);

    // Fallback: listen for formbricks postMessage events
    window.addEventListener("message", function(event) {
      if (event.origin !== "https://app.formbricks.com") return;
      console.log("formbricks event:", event.data);
      if (event.data && event.data.questionText) {
        speak(event.data.questionText);
      }
      // Advance on any navigation event
      if (event.data && (event.data.type === "nextQuestion" || event.data.type === "prevQuestion")) {
        currentIndex = event.data.questionIndex || currentIndex + 1;
        if (questions[currentIndex]) {
          speak(questions[currentIndex]);
        }
      }
    });

    document.getElementById("btn-mute").addEventListener("click", function() {
      muted = !muted;
      this.textContent = muted ? "Unmute" : "Mute";
      if (muted) synth.cancel();
    });

    document.getElementById("btn-replay").addEventListener("click", replay);
  </script>

</body>
</html>
